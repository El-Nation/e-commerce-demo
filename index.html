<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
/* Button styling */
    .adidas-btn{
        background-color:black;
        color:white;
        border:none;
        padding:12px 24px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        border-radius:4px;
        transition:0.3;
    }
    /* Hover effect */
    .adidas-btn:hover{
        background-color:white;
        color:black;
        border:2px solid black;
    }

<body>

        <button class="adidas-btn">shop now</button>
    
</body>
</html>
